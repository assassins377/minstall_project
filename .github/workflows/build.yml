name: Compile MInstAll

# Запускать скрипт при каждом пуше (заливке кода) в ветку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Запрашиваем бесплатный сервер на Windows
    runs-on: windows-latest

    steps:
    - name: Скачиваем код из репозитория
      uses: actions/checkout@v4

    - name: Устанавливаем 32-битный Python 3.10 (Универсальный)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x86' # Принудительно ставим 32-битный Python для x86 экзешника

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wxPython

    - name: Компилируем MInstAll.exe
      run: |
        pyinstaller --clean --noconsole --onefile --name MInstAll_x86 --icon=icons/system.png main.py

    - name: Загружаем готовый .exe как артефакт
      uses: actions/upload-artifact@v4
      with:
        name: MInstAll_x86_Executable
        path: dist/MInstAll_x86.exe
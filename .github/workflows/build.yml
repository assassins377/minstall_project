name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем зависимости
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Запускаем тесты
      run: python -m pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            python-arch: x86
          - arch: x64
            python-arch: x64
    name: Build ${{ matrix.arch }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем ${{ matrix.arch }} Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.python-arch }}

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Компилируем MInstAll_${{ matrix.arch }}.exe
      run: |
        pyinstaller --clean --noconsole --onefile --uac-admin --name MInstAll_${{ matrix.arch }} --icon=icons/system.png main.py

    - name: Загружаем артефакт
      uses: actions/upload-artifact@v4
      with:
        name: MInstAll_${{ matrix.arch }}_Executable
        path: dist/MInstAll_${{ matrix.arch }}.exe
